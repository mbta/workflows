name: Deploy to ECS

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
        description: The name of the app, used to generate the ECS service name and ECS cluster if not specified
      dockerfile-path:
        type: string
        description: Path to the repo's Dockerfile
        required: false
        default: "."
      docker-additional-args:
        type: string
        description: Additional arguments to pass to call to docker
        required: false
        default: ""
      docker-additional-tags:
        type: string
        description: Additional tags for the image, separated by spaces
        required: false
        default: ""
      environment:
        type: string
        required: true
        description: E.g. 'prod' or 'dev', to concatenate with app for ECS service
      cluster:
        type: string
        required: false
        description: Name of the ECS cluster, defaulting to app-name if not specified
      allow-zero-desired:
        type: boolean
        description: Whether the deploy allows the ECS desiredCount to be 0
        required: false
        default: false
    secrets:
      aws-role-arn:
        required: true
      docker-repo:
        required: true
      slack-webhook:
        required: true

permissions: {}

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Needed to access ECR and ECS
      contents: read # Needed to access commit details and other repository info
    environment: ${{ inputs.environment }}
    concurrency: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: mbta/actions/build-push-ecr@d37877022d4ae12e96663d2e0a970a5214a2e232 # v2.20
        id: build-push
        with:
          role-to-assume: ${{ secrets.aws-role-arn }}
          docker-repo: ${{ secrets.docker-repo }}
          dockerfile-path: ${{ inputs.dockerfile-path }}
          docker-additional-args: ${{ inputs.docker-additional-args }}
          docker-additional-tags: ${{ inputs.docker-additional-tags }}
      - uses: mbta/actions/deploy-ecs@62db3e5c547c3c7f439c4a7fb98e69fc79c1a9cc # v2.21
        with:
          role-to-assume: ${{ secrets.aws-role-arn }}
          ecs-cluster: ${{ inputs.cluster || inputs.app-name }}
          ecs-service: ${{ inputs.app-name }}-${{ inputs.environment }}
          docker-tag: ${{ steps.build-push.outputs.docker-tag }}
          allow-zero-desired: ${{ inputs.allow-zero-desired && 'true' || 'false' }}
      - uses: mbta/actions/notify-slack-deploy@d37877022d4ae12e96663d2e0a970a5214a2e232 # v2.20
        if: ${{ !cancelled() }}
        with:
          webhook-url: ${{ secrets.slack-webhook }}
          job-status: ${{ job.status }}
